<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trend Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Fashion Trend Dashboard</h1>
<canvas id="chart"></canvas>

<script>
const data = [
{ term: "tailleur", wow: 37.2 },
{ term: "satinkleid", wow: 37.2 },
{ term: "abendkleid", wow: 22.2 },
{ term: "bikini", wow: -28.2 },
{ term: "tshirt", wow: -37.3 }
];

new Chart(document.getElementById('chart'), {
type: 'bar',
data: {
labels: data.map(d => d.term),
datasets: [{
label: 'WoW',
data: data.map(d => d.wow)
}]
}
});
</script>

</body>
</html>
