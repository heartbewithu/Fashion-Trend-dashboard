<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>欧洲服饰搜索趋势分析</title>

  <!-- 图表 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Excel解析 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }
    h2 {
      margin-top: 40px;
    }
    .chart-container {
      width: 600px;
      margin-bottom: 40px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background-color: #333;
      color: white;
    }
    #insights {
      background: white;
      padding: 15px;
    }
  </style>
</head>

<body>

<h1>📊 欧洲市场搜索趋势分析</h1>

<h2>📂 上传数据</h2>
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls">

<!-- 图表 -->
<div class="chart-container">
  <canvas id="trendChart"></canvas>
</div>

<div class="chart-container">
  <canvas id="languageChart"></canvas>
</div>

<h2>📋 数据表（Top & Bottom 10）</h2>
<table id="dataTable">
  <thead>
    <tr>
      <th>关键词</th>
      <th>语种</th>
      <th>WoW变化</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>📊 自动分析</h2>
<ul id="insights"></ul>

<script>

let chart1, chart2;

// ===== 文件读取 =====
document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  if (file.name.endsWith(".csv")) {
    reader.onload = function(e) {
      parseCSV(e.target.result);
    };
    reader.readAsText(file);
  } else {
    reader.onload = function(e) {
      const workbook = XLSX.read(e.target.result, { type: 'binary' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      processData(json);
    };
    reader.readAsBinaryString(file);
  }
}

// ===== CSV解析 =====
function parseCSV(text) {
  const rows = text.split("\n").slice(1);

  const data = rows.map(row => {
    const cols = row.split(",");
    return {
      term: cols[0],
      lang: cols[1],
      search_uv: Number(cols[3]),
      lw_uv: Number(cols[4]),
      wow: parseFloat(cols[6])
    };
  });

  processData(data);
}

// ===== 数据处理 =====
function processData(data) {

  const cleaned = data.map(d => ({
    term: d["Search term"] || d["term"],
    lang: d["语种"] || d["lang"],
    search_uv: Number(d["search_uv"]),
    lw_uv: Number(d["lw search_uv"]),
    wow: parseFloat(d["wow"])
  }));

  const filtered = cleaned.filter(d =>
    d.search_uv > 50 && d.lw_uv > 50
  );

  if (filtered.length === 0) {
    alert("⚠️ 没有符合条件的数据，请检查列名或数据格式！");
    return;
  }

  const sorted = filtered.sort((a, b) => b.wow - a.wow);

  const top10 = sorted.slice(0, 10);
  const bottom10 = sorted.slice(-10).reverse();

  renderChart([...top10, ...bottom10]);
  renderLanguageChart([...top10, ...bottom10]);
  renderTable([...top10, ...bottom10]);
  generateInsights(top10, bottom10);
}

// ===== 图表 =====
function renderChart(data) {

  if (chart1) chart1.destroy();

  chart1 = new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: {
      labels: data.map(d => d.term),
      datasets: [{
        label: 'WoW变化 (%)',
        data: data.map(d => d.wow)
      }]
    }
  });
}

// ===== 语种分布 =====
function renderLanguageChart(data) {

  if (chart2) chart2.destroy();

  const langCount = {};
  data.forEach(d => {
    langCount[d.lang] = (langCount[d.lang] || 0) + 1;
  });

  chart2 = new Chart(document.getElementById('languageChart'), {
    type: 'pie',
    data: {
      labels: Object.keys(langCount),
      datasets: [{
        data: Object.values(langCount)
      }]
    }
  });
}

// ===== 表格 =====
function renderTable(data) {
  const tableBody = document.querySelector("#dataTable tbody");
  tableBody.innerHTML = "";

  data.forEach(d => {
    tableBody.innerHTML += `
      <tr>
        <td>${d.term}</td>
        <td>${d.lang}</td>
        <td style="color:${d.wow>0?'green':'red'}">${d.wow}%</td>
      </tr>
    `;
  });
}

// ===== 自动分析 =====
function generateInsights(top10, bottom10) {

  const insights = [];

  // 上升
  insights.push("📈 上升趋势：");
  insights.push(
    `增长较快的关键词包括：${top10.slice(0,5).map(d=>d.term).join("、")}，说明相关品类需求明显提升。`
  );

  // 下降
  insights.push("📉 下降趋势：");
  insights.push(
    `下降明显的关键词包括：${bottom10.slice(0,5).map(d=>d.term).join("、")}，可能反映季节性或需求回落。`
  );

  // 市场判断
  if (top10.length > bottom10.length) {
    insights.push("📊 市场整体呈增长趋势");
  } else {
    insights.push("📊 市场整体趋于降温");
  }

  // 输出
  const ul = document.getElementById("insights");
  ul.innerHTML = "";

  insights.forEach(text => {
    ul.innerHTML += `<li>${text}</li>`;
  });
}

</script>

</body>
</html>
