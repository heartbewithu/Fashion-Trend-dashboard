<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>欧洲市场搜索趋势分析（完整版）</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f5f5f5; }
h2 { margin-top:40px; }
.chart-container { width:700px; margin-bottom:40px; }
button { padding:8px 15px; margin-left:10px; }
.analysis { background:white; padding:15px; margin-top:20px; }
</style>
</head>

<body>

<h1>📊 欧洲市场搜索趋势分析（智能版）</h1>

<input type="file" id="fileInput" accept=".csv,.xlsx"/>
<button onclick="analyze()">开始分析</button>

<div class="chart-container">
  <canvas id="trendChart"></canvas>
</div>

<h2>📋 Top上涨 / 下降词</h2>
<div id="topList"></div>

<h2>🧠 自动分析结论</h2>
<div id="analysis" class="analysis"></div>

<script>
let rawData = [];

// ===== 读取文件 =====
document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  if(file.name.endsWith('.csv')){
    reader.onload = function(e){
      const text = e.target.result;
      rawData = parseCSV(text);
    };
    reader.readAsText(file);
  } else {
    reader.onload = function(e){
      const workbook = XLSX.read(e.target.result, {type:'binary'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      rawData = XLSX.utils.sheet_to_json(sheet);
    };
    reader.readAsBinaryString(file);
  }
});

// ===== CSV解析 =====
function parseCSV(text){
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];
  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = row[i]);
    return obj;
  });
}

// ===== 智能识别字段 =====
function detectField(obj, keywords){
  return Object.keys(obj).find(k =>
    keywords.some(key => k.toLowerCase().includes(key))
  );
}

// ===== 主分析 =====
function analyze(){

  if(rawData.length === 0){
    alert("请先上传文件");
    return;
  }

  const sample = rawData[0];

  const termKey = detectField(sample, ['term','search']);
  const uvKey = detectField(sample, ['search_uv','uv','当前']);
  const lastUvKey = detectField(sample, ['lw','last','上周']);
  let wowKey = detectField(sample, ['wow','环比','%']);
  const langKey = detectField(sample, ['lang','语种']);
  const transKey = detectField(sample, ['翻译','cn']);

  let data = rawData.map(d => {

    let wow = wowKey ? parseFloat(d[wowKey]) :
      ((d[uvKey] - d[lastUvKey]) / d[lastUvKey] * 100);

    return {
      term: d[termKey],
      uv: Number(d[uvKey]),
      lastUv: Number(d[lastUvKey]),
      wow: wow,
      lang: langKey ? d[langKey] : '未知',
      trans: transKey ? d[transKey] : ''
    }
  });

  // ===== 过滤数据 =====
  data = data.filter(d => d.uv > 50 && d.lastUv > 50);

  // ===== 排序 =====
  const topUp = [...data].sort((a,b)=>b.wow-a.wow).slice(0,10);
  const topDown = [...data].sort((a,b)=>a.wow-b.wow).slice(0,10);

  // ===== 图表 =====
  new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: {
      labels: data.map(d=>d.term),
      datasets: [{
        label: 'WoW变化 (%)',
        data: data.map(d=>d.wow)
      }]
    }
  });

  // ===== 列表展示 =====
  document.getElementById('topList').innerHTML = `
  <h3>📈 上升Top10</h3>
  ${topUp.map(d=>`<div>${d.term} (${d.lang}) ↑ ${d.wow.toFixed(1)}%</div>`).join('')}

  <h3>📉 下降Top10</h3>
  ${topDown.map(d=>`<div>${d.term} (${d.lang}) ↓ ${d.wow.toFixed(1)}%</div>`).join('')}
  `;

 function generateInsights(top10, bottom10) {
  const insights = [];

  // 上升分析
  insights.push("📈 上升趋势：");
  insights.push(
    `高增长关键词主要集中在：${top10.slice(0,5).map(d=>d.term).join("、")}，说明近期这些品类需求明显增加。`
  );

  // 下降分析
  insights.push("📉 下降趋势：");
  insights.push(
    `下降关键词集中在：${bottom10.slice(0,5).map(d=>d.term).join("、")}，可能说明季节性需求减弱。`
  );

  // 结构判断
  const positiveRatio = top10.length / (top10.length + bottom10.length);
  if (positiveRatio > 0.5) {
    insights.push("📊 市场整体呈增长趋势");
  } else {
    insights.push("📊 市场整体趋于降温");
  }

  // 输出
  const ul = document.getElementById("insights");
  ul.innerHTML = "";
  insights.forEach(text => {
    ul.innerHTML += `<li>${text}</li>`;
  });
}
