<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>智能趋势分析 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f5f5f5;}
.chart-container { width:600px; margin-bottom:30px;}
select { margin:5px; padding:5px;}
</style>
</head>

<body>

<h1>📊 智能搜索趋势分析</h1>

<input type="file" id="fileInput" accept=".csv,.xlsx,.xls">

<div id="mappingUI"></div>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

<h3>📋 数据</h3>
<table border="1" id="table"></table>

<h3>📊 分析</h3>
<ul id="insights"></ul>

<script>

let rawData = [];
let chart;

// ===== 上传 =====
document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  if(file.name.endsWith(".csv")){
    reader.onload = e => parseCSV(e.target.result);
    reader.readAsText(file);
  } else {
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      rawData = XLSX.utils.sheet_to_json(sheet);
      smartDetect();
    };
    reader.readAsBinaryString(file);
  }
}

// ===== CSV =====
function parseCSV(text){
  const rows = text.split("\n");
  const headers = rows[0].split(",");

  rawData = rows.slice(1).map(r=>{
    const cols = r.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h]=cols[i]);
    return obj;
  });

  smartDetect();
}

// ===== 智能识别 =====
function smartDetect(){

  const keys = Object.keys(rawData[0]);
  console.log("检测字段：", keys);

  function findField(patterns){
    return keys.find(k =>
      patterns.some(p => k.toLowerCase().includes(p))
    );
  }

  const mapping = {
    term: findField(["term","关键词","search"]),
    lang: findField(["lang","语种","language"]),
    search_uv: findField(["search_uv","uv"]),
    lw_uv: findField(["lw","last"]),
    wow: findField(["wow","变化"])
  };

  console.log("自动识别：", mapping);

  renderMappingUI(mapping, keys);
}

// ===== UI选择 =====
function renderMappingUI(mapping, keys){

  const div = document.getElementById("mappingUI");

  function select(name, value){
    return `
      <label>${name}:</label>
      <select id="${name}">
        ${keys.map(k=>`<option ${k===value?'selected':''}>${k}</option>`).join("")}
      </select>
    `;
  }

  div.innerHTML = `
    <h3>字段确认（自动识别失败可手动调整）</h3>
    ${select("term", mapping.term)}
    ${select("lang", mapping.lang)}
    ${select("search_uv", mapping.search_uv)}
    ${select("lw_uv", mapping.lw_uv)}
    ${select("wow", mapping.wow)}
    <button onclick="runAnalysis()">开始分析</button>
  `;
}

// ===== 分析 =====
function runAnalysis(){

  const termKey = document.getElementById("term").value;
  const langKey = document.getElementById("lang").value;
  const uvKey = document.getElementById("search_uv").value;
  const lwKey = document.getElementById("lw_uv").value;
  const wowKey = document.getElementById("wow").value;

  const data = rawData.map(d=>({
    term: d[termKey],
    lang: d[langKey],
    search_uv: Number(d[uvKey]),
    lw_uv: Number(d[lwKey]),
    wow: parseFloat(d[wowKey])
  }));

  const filtered = data.filter(d => d.search_uv>50 && d.lw_uv>50);

  if(filtered.length===0){
    alert("没有符合条件数据");
    return;
  }

  const sorted = filtered.sort((a,b)=>b.wow-a.wow);

  const top10 = sorted.slice(0,10);
  const bottom10 = sorted.slice(-10).reverse();

  const final = [...top10, ...bottom10];

  drawChart(final);
  drawTable(final);
  drawInsights(top10,bottom10);
}

// ===== 图表 =====
function drawChart(data){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:data.map(d=>d.term),
      datasets:[{
        label:"WoW变化",
        data:data.map(d=>d.wow)
      }]
    }
  });
}

// ===== 表格 =====
function drawTable(data){
  const table = document.getElementById("table");

  table.innerHTML = `
    <tr><th>词</th><th>语种</th><th>WoW</th></tr>
    ${data.map(d=>`
      <tr>
        <td>${d.term}</td>
        <td>${d.lang}</td>
        <td style="color:${d.wow>0?'green':'red'}">${d.wow}%</td>
      </tr>
    `).join("")}
  `;
}

// ===== 分析 =====
function drawInsights(top,bottom){

  const ul = document.getElementById("insights");

  ul.innerHTML = `
    <li>📈 上升趋势：${top.slice(0,5).map(d=>d.term).join("、")}</li>
    <li>📉 下降趋势：${bottom.slice(0,5).map(d=>d.term).join("、")}</li>
    <li>📊 市场判断：${top.length>bottom.length?"增长":"降温"}</li>
  `;
}

</script>

</body>
</html>
